- id: lighting_common_evening_sunset_on_seasonal
  alias: Lighting - Common Areas On Before Sunset (Seasonal)
  description: Turn on common-area lights plus Lounge before sunset using seasonal offsets, and include David's Office filament light.
  triggers:
    - trigger: sun
      event: sunset
      offset: "-01:00:00"
  conditions: []
  actions:
    - action: script.lighting_wait_seasonal_offset
      data:
        offset_direction: "minus"
    - action: light.turn_on
      target:
        area_id:
          - attic_lounge
          - dining_room
          - kitchen
          - hallway
          - landing
          - side_hall
          - living_room
      data:
        brightness_pct: 100
        color_temp_kelvin: 2700
        transition: 3
    - action: light.turn_on
      target:
        entity_id: light.office_filament
      data:
        brightness_pct: 100
        color_temp_kelvin: 2700
        transition: 3
  mode: single

- id: lighting_overnight_shutdown_0200
