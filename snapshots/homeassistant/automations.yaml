  mode: single

- id: lighting_common_weekday_morning_0620_presunrise
  alias: Lighting - Common Areas On 06:20 Mon-Thu Pre-Sunrise
  description: Turn on common-area lights at 06:20 Monday-Thursday only if sunrise has not happened yet.
  triggers:
    - trigger: time
      at: "06:20:00"
  conditions:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
    - condition: sun
      before: sunrise
  actions:
    - action: light.turn_on
      target:
        area_id:
          - attic_lounge
          - dining_room
          - kitchen
          - hallway
          - landing
          - side_hall
      data:
        brightness_pct: 80
        color_temp_kelvin: 4000
        transition: 2
  mode: single

- id: lighting_evening_dim_1900
  alias: Lighting - Evening Lights Dim To 80% At 19:00
  description: At 19:00, reduce currently-on evening target lights to 80% without turning on lights that are off.
  triggers:
    - trigger: time
      at: "19:00:00"
  conditions: []
  actions:
    - variables:
        evening_on_lights: >-
          {{ expand(
               area_entities('attic_lounge'),
               area_entities('dining_room'),
               area_entities('kitchen'),
               area_entities('hallway'),
               area_entities('landing'),
               area_entities('side_hall'),
               area_entities('living_room'),
               area_entities('front_porch'),
               'light.office_filament'
             )
             | selectattr('domain', 'eq', 'light')
             | selectattr('state', 'eq', 'on')
             | map(attribute='entity_id')
             | list }}
    - condition: template
      value_template: "{{ evening_on_lights | count > 0 }}"
    - action: light.turn_on
      target:
        entity_id: "{{ evening_on_lights }}"
      data:
        brightness_pct: 80
        color_temp_kelvin: 2700
        transition: 3
  mode: single

- id: lighting_all_lights_off_after_sunrise_seasonal
  alias: Lighting - All Lights Off After Sunrise (Seasonal Daily)
  description: Turn off all lights after sunrise every day using seasonal offsets from a common script.
  triggers:
    - trigger: sun
      event: sunrise
  conditions: []
  actions:
    - action: script.lighting_wait_seasonal_offset
      data:
        offset_direction: "plus"
    - action: light.turn_off
      target:
        entity_id: all
      data:
        transition: 2
  mode: restart

