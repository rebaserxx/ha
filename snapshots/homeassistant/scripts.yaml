lighting_apply_profile_core:
  alias: Lighting Apply Profile Core
  description: Apply on/off actions with reusable day/evening/night presets to one or more areas.
  mode: restart
  fields:
    target_areas:
      description: Area IDs to target.
      example: "living_room,dining_room"
    profile:
      description: Lighting profile to apply when action is on.
      example: "evening"
      selector:
        select:
          options:
            - "day"
            - "evening"
            - "night"
    action:
      description: Turn lights on with profile or turn lights off.
      example: "on"
      selector:
        select:
          options:
            - "on"
            - "off"
    transition:
      description: Transition time in seconds.
      example: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          mode: box
  sequence:
    - variables:
        selected_areas: "{{ target_areas | default([], true) }}"
        selected_profile: >-
          {% set p = (profile | default('evening') | string | lower) %}
          {{ p if p in ['day', 'evening', 'night'] else 'evening' }}
        selected_action: "{{ 'off' if (action | default('on') | string | lower) in ['off', 'false', '0'] else 'on' }}"
        selected_transition: "{{ transition | default(2) | int(2) }}"
    - condition: template
      value_template: "{{ selected_areas | count > 0 }}"
    - repeat:
        for_each: "{{ selected_areas }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ selected_action == 'off' }}"
                sequence:
                  - service: light.turn_off
                    target:
                      area_id: "{{ repeat.item }}"
                    data:
                      transition: "{{ selected_transition | int(2) }}"
              - conditions:
                  - condition: template
                    value_template: "{{ selected_action == 'on' and selected_profile == 'day' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      area_id: "{{ repeat.item }}"
                    data:
                      brightness_pct: 100
                      color_temp_kelvin: 4000
                      transition: "{{ selected_transition | int(2) }}"
              - conditions:
                  - condition: template
                    value_template: "{{ selected_action == 'on' and selected_profile == 'night' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      area_id: "{{ repeat.item }}"
                    data:
                      brightness_pct: 10
                      color_temp_kelvin: 2000
                      transition: "{{ selected_transition | int(2) }}"
            default:
              - service: light.turn_on
                target:
                  area_id: "{{ repeat.item }}"
                data:
                  brightness_pct: 80
                  color_temp_kelvin: 2700
                  transition: "{{ selected_transition | int(2) }}"

lighting_common_areas:
  alias: Lighting Common Areas
  description: Wrapper for internal common-area lighting (excluding Lounge).
  mode: restart
  fields:
    profile:
      description: day, evening, or night.
      example: "evening"
    action:
      description: on or off.
      example: "on"
    transition:
      description: Transition time in seconds.
      example: 2
  sequence:
    - service: script.lighting_apply_profile_core
      data:
        target_areas:
          - attic_lounge
          - dining_room
          - kitchen
          - hallway
          - landing
          - side_hall
        profile: "{{ profile | default('evening') }}"
        action: "{{ action | default('on') }}"
        transition: "{{ transition | default(2) }}"

